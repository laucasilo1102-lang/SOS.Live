<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Empresa - SOS.LIVE</title>
  <link rel="icon" type="image/png" href="img/Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./Profile.css">
</head>
<body>
  <section class="profile-section">
    

    <div class="overlay"></div>

    <div class="container h-100 position-relative z-2">
      <div class="row align-items-center h-100 g-4">
        <div class="col-lg-5 text-white side-copy">
          <h2 class="fw-bold mb-3">Mi empresa</h2>
          <p class="mb-0">
            Actualiza la informacion principal de tu cuenta y manten todo al dia.
          </p>
        </div>

        <div class="col-lg-7">
          <div class="profile-card">
            <h3 class="text-white fw-bold mb-4">Configuracion de perfil</h3>

            <form id="profileForm" class="profile-form">
              <div class="input-group-custom">
                <i class="bi bi-building"></i>
                <input id="nombre" type="text" placeholder="Nombre de empresa" required>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <div class="input-group-custom">
                    <i class="bi bi-envelope-fill"></i>
                    <input id="email" type="email" placeholder="Correo" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="input-group-custom">
                    <i class="bi bi-telephone-fill"></i>
                    <input id="telefono" type="tel" placeholder="Telefono" required>
                  </div>
                </div>
              </div>

              <div class="input-group-custom mt-3">
                <i class="bi bi-credit-card-fill"></i>
                <input id="nit" type="text" placeholder="NIT" required>
              </div>

              <div class="actions mt-4">
                <button type="submit" class="btn btn-gold">Actualizar datos</button>
                <button type="button" id="logoutBtn" class="btn btn-outline-gold">Cerrar sesion</button>
                <button type="button" id="deleteBtn" class="btn btn-danger-soft">Eliminar cuenta</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="./Profile.js"></script>
</body>
</html>
