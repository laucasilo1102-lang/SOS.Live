<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - SOS.LIVE</title>
  <link rel="icon" type="image/png" href="../img/Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="Register.css">
</head>
<body>
  <section class="register-section">
    <a href="../Home/home.html" class="back-circle">
      <i class="bi bi-arrow-left"></i>
    </a>

    <div class="overlay"></div>

    <div class="container h-100">
      <div class="row align-items-center h-100">
        <div class="col-lg-6 d-flex justify-content-center">
          <div class="register-card">
            <h2 class="fw-bold text-white mb-4">Crear una cuenta</h2>

            <form id="registerForm" class="register-form">
              <div class="input-group-custom">
                <i class="bi bi-person-fill"></i>
                <input id="nombre" type="text" placeholder="Nombre completo" required>
              </div>

              <div class="input-group-custom">
                <i class="bi bi-envelope-fill"></i>
                <input id="email" type="email" placeholder="Correo" required>
              </div>

              <div class="input-group-custom">
                <i class="bi bi-telephone-fill"></i>
                <input id="telefono" type="tel" placeholder="Telefono" required>
              </div>

              <div class="input-group-custom">
                <i class="bi bi-credit-card-fill"></i>
                <input id="nit" type="text" placeholder="NIT" required>
              </div>

              <div class="input-group-custom">
                <i class="bi bi-lock-fill"></i>
                <input id="password" type="password" placeholder="Contrasena" required>
              </div>

              <div class="form-check text-white my-3">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small" for="terms">
                  Al registrarte aceptas <span class="gold-text">terminos y condiciones</span>
                </label>
              </div>

              <button type="submit" class="btn btn-gold w-100">Registrarse</button>
            </form>
          </div>
        </div>

        <div class="col-lg-6 text-white text-center right-content">
          <h3 class="fw-bold mb-3">Bienvenido a SOS.LIVE</h3>
          <p class="mb-4">Si ya tienes una cuenta, inicia sesion aqui.</p>
          <a href="../Login/Login.html" class="btn btn-gold px-4">Iniciar sesion</a>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./Register.js"></script>
</body>
</html>
