<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion - SOS.LIVE</title>
  <link rel="icon" type="image/png" href="../img/Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="Login.css">
</head>
<body>
  <section class="login-section">
    <a href="../Home/index.html" class="back-circle">
      <i class="bi bi-arrow-left"></i>
    </a>

    <div class="overlay"></div>

    <div class="container h-100">
      <div class="row align-items-center h-100">
        <div class="col-lg-6 text-white left-content">
          <h2 class="fw-bold mb-4">Bienvenido a SOS.LIVE</h2>
          <p class="mb-4">Si no tienes una cuenta, registrate aqui.</p>
          <a href="../Register/Register.html" class="btn btn-gold px-4">Registrarse</a>
        </div>

        <div class="col-lg-6 d-flex justify-content-center">
          <form id="loginForm" class="login-card">
            <h2 class="text-center mb-4 fw-bold text-white">Iniciar Sesion</h2>

            <div class="mb-3 position-relative">
              <i class="bi bi-person-fill input-icon"></i>
              <input id="loginEmail" type="email" class="form-control custom-input" placeholder="Correo" required>
            </div>

            <div class="mb-4 position-relative">
              <i class="bi bi-lock-fill input-icon"></i>
              <input id="loginPassword" type="password" class="form-control custom-input" placeholder="Contrasena" required>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-gold px-4">Iniciar sesion</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./Login.js"></script>
</body>
</html>
